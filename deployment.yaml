apiVersion: apps/v1
kind: Deployment
metadata:
  name: dept-webpage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dept-webpage
  template:
    metadata:
      labels:
        app: dept-webpage
    spec:
      containers:
      - name: dept-webpage
        image: your-dockerhub-username/dept-webpage:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dept-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: dept-webpage
